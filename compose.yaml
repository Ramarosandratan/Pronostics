
services:
###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

###> symfony/webpack-encore-bundle ###
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    working_dir: /app
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-changeme}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8
    volumes:
      - .:/app:delegated
      - app_vendor:/app/vendor
    depends_on:
      database:
        condition: service_healthy
    command: /bin/bash -c "composer install && php -S 0.0.0.0:8000 -t public"

  node:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    working_dir: /app
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
    command: /bin/sh -c "npm install && npm run watch"
###< symfony/webpack-encore-bundle ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
###> symfony/webpack-encore-bundle ###
  app_vendor:
  node_modules:
###< symfony/webpack-encore-bundle ###
